<div class="login-container">
  <h2>Login</h2>
  <input [(ngModel)]="loginData.username" placeholder="Username" type="text">
  <input [(ngModel)]="loginData.password" placeholder="Password" type="password">

  <button (click)='onLogin()'>Sign In</button>

  @if (message) {
    <p>{{ message }}</p>
  } @else {
    <p>Please enter your credentials.</p>
  }
</div>
